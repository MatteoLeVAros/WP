version: '3.9'

services:
  db:
    image: postgres:15
    container_name: validation_db
    restart: always
    environment:
      POSTGRES_DB: validation_db
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  backend:
    build:
      context: ./docker/php
    container_name: validation_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "composer install && php -S 0.0.0.0:8000 -t public"



  frontend:
    build:
      context: ./docker/node
    container_name: validation_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/zscaler-root.crt
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"

volumes:
 postgres_data:
 frontend_node_modules: